<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SalonOS — ניהול</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
  </div>

  <!-- ===== Login ===== -->
  <main id="login" class="login card">
    <header class="card__head">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="6" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle>
          <line x1="20" y1="4" x2="8.12" y2="15.88"></line>
          <line x1="14.47" y1="14.48" x2="20" y2="20"></line>
          <line x1="8.12" y1="8.12" x2="12" y2="12"></line>
        </svg>
      </div>
      <h1>ניהול הסלון</h1>
      <p>התחברו כדי להמשיך</p>
    </header>
    <form id="loginForm" class="form" novalidate>
      <div class="field">
        <label for="email">אימייל</label>
        <input id="email" name="email" type="email" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">סיסמה</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn" id="loginBtn">
        <span class="btn__label">כניסה</span>
        <span class="btn__spinner" aria-hidden="true"></span>
      </button>
      <div id="loginToast" class="toast" role="status" aria-live="polite"></div>
    </form>
  </main>

  <!-- ===== Dashboard ===== -->
  <div id="app" class="app" hidden>
    <aside class="sidebar">
      <div class="brand">
        <div class="logo logo--sm">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="6" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle>
            <line x1="20" y1="4" x2="8.12" y2="15.88"></line>
            <line x1="14.47" y1="14.48" x2="20" y2="20"></line>
            <line x1="8.12" y1="8.12" x2="12" y2="12"></line>
          </svg>
        </div>
        <span>SalonOS</span>
      </div>
      <nav class="nav">
        <button class="nav__item is-active" data-view="home">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5"/><path d="M5 10v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V10"/><path d="M9 21v-6h6v6"/></svg>
          <span>בית</span>
        </button>
        <button class="nav__item" data-view="appointments">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          <span>תורים</span>
        </button>
        <button class="nav__item" data-view="calendar">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span>יומן</span>
        </button>
        <button class="nav__item" data-view="clients">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>לקוחות</span>
        </button>
        <button class="nav__item" data-view="whatsapp">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
          <span>וואטסאפ</span>
        </button>
        <button class="nav__item" data-view="analytics">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span>רווחיות</span>
        </button>
        <button class="nav__item" data-view="reviews">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <span>ביקורות</span>
        </button>
        <button class="nav__item" data-view="inventory">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          <span>מלאי</span>
        </button>
        <button class="nav__item" data-view="services">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>
          <span>שירותים</span>
        </button>
        <button class="nav__item" data-view="staff">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          <span>צוות</span>
        </button>
        <button class="nav__item" data-view="plans">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <span>תוכניות</span>
        </button>
        <button class="nav__item" data-view="finance">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          <span>כספים</span>
        </button>
        <button class="nav__item" data-view="marketing">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>
          <span>שיווק</span>
        </button>
        <button class="nav__item" data-view="ai">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M5 19l2-2M17 7l2-2"/></svg>
          <span>AI ותחזיות</span>
        </button>
      </nav>
      <button id="logoutBtn" class="nav__item nav__logout">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>יציאה</span>
      </button>
    </aside>

    <main class="content">
      <!-- ===== Home / overview ===== -->
      <section id="view-home" class="view">
        <div class="view__head">
          <h2>סקירה כללית</h2>
          <div class="filters"><span id="homeDate" class="cal-range"></span></div>
        </div>
        <div id="homeBody"><div class="loading-row">טוען…</div></div>
      </section>

      <!-- ===== Appointments view ===== -->
      <section id="view-appointments" class="view">
        <div class="view__head">
          <h2>תורים</h2>
          <div class="filters">
            <input type="date" id="apptDate" class="input--sm" />
            <div class="select-wrap select-wrap--sm">
              <select id="apptStatus" class="input--sm">
                <option value="upcoming">קרובים</option>
                <option value="all">הכל</option>
                <option value="pending">ממתינים</option>
                <option value="confirmed">מאושרים</option>
                <option value="arrived">הגיעו</option>
                <option value="completed">הושלמו</option>
                <option value="cancelled">בוטלו</option>
                <option value="no_show">לא הגיעו</option>
              </select>
            </div>
            <button id="apptRefresh" class="btn btn--ghost btn--sm">רענון</button>
          </div>
        </div>
        <div id="apptList" class="list"></div>
      </section>

      <!-- ===== Calendar view ===== -->
      <section id="view-calendar" class="view" hidden>
        <div class="view__head">
          <h2>יומן שבועי</h2>
          <div class="filters">
            <button id="calPrev" class="btn btn--ghost btn--sm">‹ שבוע</button>
            <button id="calToday" class="btn btn--ghost btn--sm">היום</button>
            <button id="calNext" class="btn btn--ghost btn--sm">שבוע ›</button>
            <span id="calRange" class="cal-range"></span>
          </div>
        </div>
        <div id="calendar" class="calendar"></div>
      </section>

      <!-- ===== Clients view ===== -->
      <section id="view-clients" class="view" hidden>
        <div class="view__head">
          <h2>לקוחות</h2>
          <div class="filters">
            <input type="search" id="clientSearch" class="input--sm input--search" placeholder="חיפוש לפי שם או טלפון…" />
          </div>
        </div>
        <div id="clientList" class="list"></div>
      </section>

      <!-- ===== WhatsApp conversations ===== -->
      <section id="view-whatsapp" class="view" hidden>
        <div class="view__head">
          <h2>וואטסאפ</h2>
          <div class="filters">
            <span id="waMode" class="wa-mode"></span>
            <button id="waReminders" class="btn btn--ghost btn--sm">שליחת תזכורות</button>
            <button id="waRefresh" class="btn btn--ghost btn--sm">רענון</button>
          </div>
        </div>
        <div class="wa">
          <div class="wa__list" id="waList"></div>
          <div class="wa__thread" id="waThread"><div class="empty">בחר שיחה כדי לראות הודעות</div></div>
        </div>
      </section>

      <!-- ===== Analytics / profitability ===== -->
      <section id="view-analytics" class="view" hidden>
        <div class="view__head">
          <h2>רווחיות וביצועים</h2>
          <div class="filters">
            <div class="select-wrap select-wrap--sm">
              <select id="anRange" class="input--sm">
                <option value="30">30 ימים</option>
                <option value="90" selected>90 ימים</option>
                <option value="180">180 ימים</option>
                <option value="365">שנה</option>
              </select>
            </div>
          </div>
        </div>
        <div id="analyticsBody"><div class="loading-row">טוען…</div></div>
      </section>

      <!-- ===== Reviews & reputation ===== -->
      <section id="view-reviews" class="view" hidden>
        <div class="view__head">
          <h2>ביקורות ומוניטין</h2>
          <div class="filters"><span id="revAvg" class="cal-range"></span></div>
        </div>
        <div id="reviewsBody"><div class="loading-row">טוען…</div></div>
      </section>

      <!-- ===== Data-driven views (rendered from JS block configs) ===== -->
      <section id="view-inventory" class="view" hidden>
        <div class="view__head"><h2>מלאי</h2></div>
        <div id="dd-inventory" class="dd"></div>
      </section>

      <section id="view-services" class="view" hidden>
        <div class="view__head"><h2>שירותים</h2></div>
        <div id="dd-services" class="dd"></div>
      </section>

      <section id="view-staff" class="view" hidden>
        <div class="view__head"><h2>צוות</h2></div>
        <div id="dd-staff" class="dd"></div>
      </section>

      <section id="view-plans" class="view" hidden>
        <div class="view__head"><h2>תוכניות ונאמנות</h2></div>
        <div id="dd-plans" class="dd"></div>
      </section>

      <section id="view-finance" class="view" hidden>
        <div class="view__head"><h2>כספים</h2></div>
        <div id="dd-finance" class="dd"></div>
      </section>

      <section id="view-marketing" class="view" hidden>
        <div class="view__head"><h2>שיווק</h2></div>
        <div id="dd-marketing" class="dd"></div>
      </section>

      <section id="view-ai" class="view" hidden>
        <div class="view__head"><h2>AI ותחזיות</h2></div>
        <div id="dd-ai" class="dd"></div>
      </section>
    </main>
  </div>

  <!-- ===== Edit / create modal ===== -->
  <div id="modal" class="modal" hidden>
    <div class="modal__backdrop" data-mclose></div>
    <div class="modal__panel">
      <button class="drawer__close" data-mclose aria-label="סגירה">✕</button>
      <h3 id="modalTitle">עריכה</h3>
      <form id="modalForm" class="form" novalidate></form>
      <div id="modalToast" class="toast"></div>
    </div>
  </div>

  <!-- ===== Color-formula modal ===== -->
  <div id="fmodal" class="modal" hidden>
    <div class="modal__backdrop" data-fclose></div>
    <div class="modal__panel">
      <button class="drawer__close" data-fclose aria-label="סגירה">✕</button>
      <h3 id="fmodalTitle">פורמולת צבע</h3>
      <form id="fmodalForm" class="form" novalidate>
        <div class="row">
          <div class="field"><label for="ff_title">כותרת</label><input id="ff_title" placeholder="למשל: צבע שורשים" /></div>
          <div class="field"><label for="ff_performed_on">תאריך</label><input id="ff_performed_on" type="date" /></div>
        </div>

        <div class="field">
          <label>צבעים בשילוב</label>
          <div id="ffComponents" class="comp-list"></div>
          <button type="button" class="add-btn" id="ffAddComp">+ צבע נוסף</button>
        </div>

        <div class="row">
          <div class="field"><label for="ff_developer_volume">מספר חמצן (vol)</label><input id="ff_developer_volume" type="number" step="0.1" placeholder="20" /></div>
          <div class="field"><label for="ff_developer_amount">כמות חמצן</label><input id="ff_developer_amount" type="number" step="0.01" placeholder="90" /></div>
        </div>
        <div class="row">
          <div class="field"><label for="ff_developer_unit">יחידת חמצן</label><input id="ff_developer_unit" placeholder="ml" /></div>
          <div class="field"><label for="ff_mixing_ratio">יחס ערבוב</label><input id="ff_mixing_ratio" placeholder="1:1.5" /></div>
        </div>
        <div class="row">
          <div class="field"><label for="ff_processing_minutes">זמן החדרה (דק׳)</label><input id="ff_processing_minutes" type="number" placeholder="35" /></div>
          <div class="field"><label for="ff_technique">טכניקה</label><input id="ff_technique" placeholder="מריחה מלאה / פוילים / בליאז'" /></div>
        </div>
        <div class="field"><label for="ff_application_areas">אזורי מריחה</label><input id="ff_application_areas" placeholder="שורשים / אורכים / קצוות" /></div>

        <div class="fgroup">
          <div class="fgroup__title">טונר</div>
          <div class="row">
            <div class="field"><label for="ff_toner_shade">גוון טונר</label><input id="ff_toner_shade" placeholder="למשל /81" /></div>
            <div class="field"><label for="ff_toner_brand">חברה</label><input id="ff_toner_brand" placeholder="Wella" /></div>
          </div>
          <div class="row">
            <div class="field"><label for="ff_toner_developer">חמצן לטונר</label><input id="ff_toner_developer" placeholder="6 vol / 1.9%" /></div>
            <div class="field"><label for="ff_toner_minutes">זמן השהיה (דק׳)</label><input id="ff_toner_minutes" type="number" placeholder="10" /></div>
          </div>
        </div>

        <div class="fgroup">
          <div class="fgroup__title">בדיקת רגישות</div>
          <label class="field field--check"><input id="ff_patch_test_done" type="checkbox" /> בוצעה בדיקת רגישות</label>
          <div class="row">
            <div class="field"><label for="ff_patch_test_date">תאריך בדיקה</label><input id="ff_patch_test_date" type="date" /></div>
            <div class="field"><label for="ff_patch_test_notes">תוצאת בדיקה</label><input id="ff_patch_test_notes" placeholder="ללא תגובה / תקין" /></div>
          </div>
        </div>

        <div class="field"><label for="ff_result_notes">תוצאה / הערות מקצועיות</label><textarea id="ff_result_notes" rows="2"></textarea></div>

        <button type="submit" class="btn"><span class="btn__label">שמירה</span><span class="btn__spinner" aria-hidden="true"></span></button>
        <div id="fmodalToast" class="toast"></div>
      </form>
    </div>
  </div>

  <!-- ===== Client card drawer ===== -->
  <div id="drawer" class="drawer" hidden>
    <div class="drawer__backdrop" data-close></div>
    <aside class="drawer__panel">
      <button class="drawer__close" data-close aria-label="סגירה">✕</button>
      <div id="drawerBody"></div>
    </aside>
  </div>

  <div id="toast" class="toast toast--float" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin.js"></script>
</body>
</html>
